<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modulo Ordine</title>
    <link rel="stylesheet" href="/stile.css">
    <style>
        table { border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: left; }
        .input-qty { width: 50px; }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Ordine Prodotti</h1>
            <table id="tabellaProdotti">
                <thead>
                    <tr><th>Qta</th><th>Descrizione</th><th>Costo unitario</th><th>Totale</th></tr>
                </thead>
                <tbody>
                    <tr><td class="cellaConInput"><input type="number" id="inputMouse" onchange="cambiaPrezzo1()"></td><td>mouse</td><td>16</td><td id="costoTotaleMouse">0</td></tr>
                    <tr><td class="cellaConInput"><input type="number" id="inputTastiera" onchange="cambiaPrezzo2()"></td><td>tastiera 105 tasti</td><td>25</td><td id="costoTotaleTastiera">0</td></tr>  
                    <tr><td class="cellaConInput"><input type="number" id="inputStampante" onchange="cambiaPrezzo3()"></td><td>stampante deskjet colori</td><td>350</td><td id="costoTotaleStampante">0</td></tr>
                    <tr><td class="cellaConInput"><input type="number" id="inputScanner" onchange="cambiaPrezzo4()"></td><td>scanner A4 colori</td><td>200</td><td id="costoTotaleScanner">0</td></tr>
                    <tr><td class="cellaConPulsante" colspan="3"><button id="bottoneOrdine" onclick="elaboraOrdine()">Totale ordine --></button></td><td id="costoTotale">0</td></tr>
                </tbody>
            </table>

            <div>
                <p>Desidero ricevere notifiche</p>
                <input type="radio" id="Si" name="sceltaNotifiche" value=1>
                <label>Si</label>
                <input type="radio" id="No" name="sceltaNotifiche" value=0>
                <label>No</label>
            </div>
            <br>
            <div>
                <label>Email</label>
                <input type="email" id="email"> 
            </div>
            <br>
            <div>
                <label>Metodo di pagamento</label>
                <select id="menuPagamento">
                    <option>Contanti</option>
                    <option>Carta</option>
                    <option>Bonifico</option>
                </select>
            </div>
            <div>
                <button id="bottoneFinale" onclick="visualizzaStringaFinale()">Totale ordine --></button>
            </div>
            <p id="stringaFinale"></p>

    <script src="script.js"></script>

</body>
</html>
