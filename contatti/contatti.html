<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stile.css">
  <title>Contatti | Giuseppe Statella</title>
</head>
<body>

  <nav id="nav-principale">
    <div class="nav-container">
      <span class="logo">GS_Portfolio</span>
      <ul>
        <li><a href="index.html#about" class="nav-link">Chi sono</a></li>
        <li><a href="index.html#competenze" class="nav-link">Competenze</a></li>
        <li><a href="index.html#progetti" class="nav-link">Progetti</a></li>
        <li><a href="contatti.html" class="nav-link">Contatti</a></li>
      </ul>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1>Mettiamoci in contatto</h1>
      <p class="hero-intro">Hai un progetto o vuoi fare due chiacchiere? Scrivimi pure!</p>
    </div>
  </header>

  <main class="container">
    <section class="sezione">
      <h2>Modulo di contatto</h2>
      <form action="#" method="POST" class="form-contatti">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" required placeholder="Il tuo nome">
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="La tua email">
        </div>

        <div class="form-group">
          <label for="messaggio">Messaggio</label>
          <textarea id="messaggio" name="messaggio" rows="5" required placeholder="Come posso aiutarti?"></textarea>
        </div>

        <button type="submit" class="btn">Invia Messaggio</button>
      </form>
    </section>
  </main>

  <footer class="footer-principale">
    <p>&copy; 2026 Giuseppe Salvatore Statella — Built with &hearts; and CSS Grid</p>
  </footer>

</body>
</html>
